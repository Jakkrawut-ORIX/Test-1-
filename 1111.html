<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>THAI ORIX LEASING – Lease Calculator</title>

<style>
:root{
  --bg:#f1f5f9;
  --panel:#ffffff;
  --primary:#003A8C;
  --primary-soft:#0b5ed7;
  --border:#dbe2ef;
  --text:#1f2937;
  --muted:#6b7280;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  font-family:Segoe UI,Arial,sans-serif;
  color:var(--text);
}

.wrap{
  max-width:1200px;
  margin:40px auto 120px;
  padding:0 20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:22px;
  margin-bottom:30px;
}

h1{color:var(--primary);}
h3{
  margin-top:0;
  color:var(--primary);
  border-bottom:2px solid var(--primary);
  padding-bottom:6px;
  margin-bottom:16px;
}

label{font-size:13px;color:var(--muted);}
input,select{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:8px;
  margin-top:6px;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--primary-soft);
  box-shadow:0 0 0 2px rgba(11,94,215,0.15);
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{background:var(--primary-soft);}

.grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:20px;
}

.col-6{grid-column:span 6;}
.col-4{grid-column:span 4;}
.col-12{grid-column:span 12;}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  color:var(--primary);
  padding:8px 6px;
}

td{
  padding:8px 6px;
  border-bottom:1px solid var(--border);
}

.right{text-align:right}
.center{text-align:center}

.quote{
  background:white;
  border:2px solid var(--primary);
  border-radius:12px;
  padding:24px;
  margin-top:30px;
}

@media print{
  body{background:white;}
  .no-print{display:none;}
  .card{border:none;}
}
</style>
</head>

<body>
<div class="wrap">

<h1>THAI ORIX LEASING – Internal Calculator</h1>

<div class="card">
<h3>ข้อมูลลูกค้า & เอกสาร</h3>
<div class="grid">
<div class="col-6">
<label>ชื่อลูกค้า</label>
<input id="custName" value="Test">
</div>
<div class="col-6">
<label>ผู้เสนอราคา</label>
<input id="fromName" value="Jakkrawut Naksomphan">
</div>
</div>
</div>

<div class="card">
<h3>ทรัพย์สิน / รถ</h3>
<div class="grid">
<div class="col-4">
<label>รุ่นรถ</label>
<input id="assetName" value="Zeekr 009 6Seat">
</div>
<div class="col-4">
<label>ราคารถ (Gross)</label>
<input id="gross" type="number" value="3159000">
</div>
<div class="col-4">
<label>VAT (%)</label>
<input id="vatPct" type="number" value="7">
</div>
</div>
</div>

<div class="card">
<h3>เงินดาวน์ & Balloon</h3>
<div class="grid">
<div class="col-4">
<label>ประเภทดาวน์</label>
<select id="downType">
<option value="amount">จำนวนเงิน</option>
<option value="percent">เปอร์เซ็นต์</option>
</select>
</div>
<div class="col-4">
<label>ค่าเงินดาวน์</label>
<input id="downInput" type="number" value="1288035">
</div>
<div class="col-4">
<label>Balloon</label>
<input id="balloonInput" type="number" value="0">
</div>
</div>
</div>

<div class="card">
<h3>โหมดคำนวณ & คอมมิชชั่น</h3>
<div class="grid">
<div class="col-4">
<label>Flat Rate (%)</label>
<input id="flatRate" type="number" value="3.09">
</div>
<div class="col-4">
<label>จำนวนปี</label>
<input id="years" type="number" value="5">
</div>
<div class="col-4">
<label>% ค่าคอม</label>
<input id="commPct" type="number" value="2.5">
</div>
</div>
</div>

<div class="card">
<button onclick="recalc()">คำนวณ</button>
</div>

<div class="card">
<h3>ผลลัพธ์</h3>
<table>
<tr><th>ราคาสุทธิ</th><td class="right" id="net"></td></tr>
<tr><th>เงินดาวน์</th><td class="right" id="down"></td></tr>
<tr><th>ยอดจัด</th><td class="right" id="finance"></td></tr>
<tr><th>ดอกเบี้ยรวม</th><td class="right" id="interest"></td></tr>
<tr><th>ค่างวด (Incl VAT)</th><td class="right" id="pmt"></td></tr>
<tr><th>Purchase Offer Price</th><td class="right" id="purchase"></td></tr>
<tr><th>ค่าคอม</th><td class="right" id="commission"></td></tr>
</table>
</div>

</div>

<script>
function fmt(x){
  return Number(x).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function recalc(){

let gross=parseFloat(document.getElementById('gross').value)||0;
let vat=parseFloat(document.getElementById('vatPct').value)/100;
let downType=document.getElementById('downType').value;
let downInput=parseFloat(document.getElementById('downInput').value)||0;
let balloon=parseFloat(document.getElementById('balloonInput').value)||0;
let flat=parseFloat(document.getElementById('flatRate').value)/100;
let years=parseFloat(document.getElementById('years').value)||0;
let commPct=parseFloat(document.getElementById('commPct').value)/100;

let net=gross;

if(downType==='percent'){
  downInput=Math.min(100,Math.max(0,downInput));
  document.getElementById('downInput').value=downInput;
}

let down=(downType==='percent')? net*(downInput/100) : downInput;

let finance=net-down;
let totalInterest=finance*flat*years;
let months=years*12;

let pmt=(finance+totalInterest)/months;
pmt=Math.ceil(pmt); // ROUND UP

let purchase=(down===0)?1000:(down+balloon);
let commission=Math.round(finance*commPct);

document.getElementById('net').innerText=fmt(net);
document.getElementById('down').innerText=fmt(down);
document.getElementById('finance').innerText=fmt(finance);
document.getElementById('interest').innerText=fmt(totalInterest);
document.getElementById('pmt').innerText=fmt(pmt);
document.getElementById('purchase').innerText=fmt(purchase);
document.getElementById('commission').innerText=fmt(commission);
}

recalc();
</script>

</body>
</html>
