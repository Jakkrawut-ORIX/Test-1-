<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ORIX Leasing Calculator</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:20px;}
.container{max-width:1500px;margin:auto;background:#fff;padding:25px;border-radius:10px;}
h2{color:#003f87;margin-top:0}
.section{border:1px solid #ddd;border-radius:8px;padding:15px;margin-bottom:20px;}
.section h3{margin-top:0;color:#003f87}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
input,select{width:100%;padding:6px;}
button{padding:10px 16px;background:#003f87;color:white;border:none;border-radius:5px;cursor:pointer}
.result{background:#eef2f7;padding:15px;border-radius:8px;margin-top:20px;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
td,th{border:1px solid #ddd;padding:6px;text-align:right;}
th{background:#003f87;color:white;}
.label{text-align:left}
</style>
</head>

<body>
<div class="container">

<h2>ORIX Internal Leasing Calculator</h2>

<!-- ================= CUSTOMER SECTION ================= -->
<div class="section">
<h3>📄 ข้อมูลลูกค้า & เอกสาร</h3>
<div class="grid">
<div><label>ชื่อลูกค้า</label><input id="customer" value="Test"></div>
<div><label>MKT</label><input id="mkt" value="Jakkrawut Naksomphan"></div>
<div><label>อายุใบเสนอราคา (วัน)</label><input type="number" id="quoteAge" value="30"></div>
<div><label>วันที่ออกเอกสาร</label><input type="date" id="issueDate"></div>
</div>
</div>

<!-- ================= ASSET SECTION ================= -->
<div class="section">
<h3>🚗 ทรัพย์สิน / รถ</h3>
<div class="grid">
<div><label>รุ่นรถ</label><input id="model" value="Zeekr 009 6Seat"></div>
<div><label>ราคารถ (Gross)</label><input type="number" id="gross" value="3159000"></div>
<div><label>ส่วนลด (-)</label><input type="number" id="discount" value="0"></div>
<div><label>Option (+)</label><input type="number" id="optionAdd" value="0"></div>
</div>
</div>

<!-- ================= PRICE SECTION ================= -->
<div class="section">
<h3>💰 ราคา & VAT</h3>
<div class="grid">
<div><label>VAT (%)</label><input type="number" id="vat" value="7"></div>
<div><label>จำนวนปี (Terms)</label><input type="number" id="years" value="5"></div>
</div>
</div>

<!-- ================= DEPOSIT SECTION ================= -->
<div class="section">
<h3>💳 เงินดาวน์ & Balloon</h3>
<div class="grid">
<div>
<label>ประเภทดาวน์</label>
<select id="downType">
<option value="amount">บาท</option>
<option value="percent">%</option>
</select>
</div>

<div>
<label>เงินดาวน์</label>
<input type="number" id="depositInput" value="1288035">
</div>

<div>
<label>Balloon</label>
<select id="balloonFlag">
<option value="false">FALSE</option>
<option value="true">TRUE</option>
</select>
</div>

<div>
<label>ประเภท Balloon</label>
<select id="balloonType">
<option value="amount">บาท</option>
<option value="percent">%</option>
</select>
</div>

<div>
<label>ค่า Balloon</label>
<input type="number" id="balloonInput" value="0">
</div>
</div>
</div>

<!-- ================= CALC MODE ================= -->
<div class="section">
<h3>📊 โหมดคำนวณ & คอมมิชชั่น</h3>
<div class="grid">
<div>
<label>Flat Rate (%)</label>
<input type="number" step="0.01" id="flatRate" value="3.09">
</div>

<div>
<label>IRR Target (%)</label>
<input type="number" step="0.0001" id="irrTarget" value="0.0574">
</div>

<div>
<label>ฐานค่าคอมมิชชั่น</label>
<select id="commissionBaseType">
<option value="finance">ยอดจัด</option>
<option value="interest">ดอกเบี้ย</option>
</select>
</div>

<div>
<label>% ค่าคอม</label>
<input type="number" id="commissionRate" value="2.5">
</div>

<div>
<label>Extra ค่าคอม (บาท)</label>
<input type="number" id="commissionExtra" value="0">
</div>
</div>
</div>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let gross = num("gross")
let discount = num("discount")
let optionAdd = num("optionAdd")
let vatRate = num("vat")/100
let downType = val("downType")
let depositInput = num("depositInput")
let balloonFlag = val("balloonFlag")==="true"
let balloonType = val("balloonType")
let balloonInput = num("balloonInput")
let years = num("years")
let flatRate = num("flatRate")/100
let commissionRate = num("commissionRate")/100
let commissionExtra = num("commissionExtra")

let netPrice = gross - discount + optionAdd

// จำกัด % ดาวน์ ไม่เกิน 100%
if(downType==="percent"){
if(depositInput>100){ depositInput=100; document.getElementById("depositInput").value=100 }
}

let deposit = downType==="percent" ? netPrice*depositInput/100 : depositInput

let balloon=0
if(balloonFlag){
balloon = balloonType==="percent" ? netPrice*balloonInput/100 : balloonInput
}

let finance = netPrice - deposit
let periods = years*12
let financeLessBalloon = finance - balloon

let totalInterest = financeLessBalloon * flatRate * years

let monthlyIncVAT = periods>0 ? (financeLessBalloon + totalInterest)/periods : 0

// ROUND UP เป็น .00 เสมอ
monthlyIncVAT = Math.ceil(monthlyIncVAT)

let commissionBase = val("commissionBaseType")==="interest" ? totalInterest : finance
let commission = Math.round(commissionBase*commissionRate + commissionExtra)

// Purchase Offer Price
let purchaseOffer = deposit==0 ? 1000 : (deposit + balloon)

document.getElementById("result").innerHTML = `
<b>ราคาสุทธิ:</b> ${fmt(netPrice)} <br>
<b>เงินดาวน์:</b> ${fmt(deposit)} <br>
<b>Balloon:</b> ${fmt(balloon)} <br>
<b>ยอดจัด:</b> ${fmt(finance)} <br>
<b>ดอกเบี้ยรวม:</b> ${fmt(totalInterest)} <br>
<b>ค่างวด/เดือน (Incl VAT):</b> ${fmt(monthlyIncVAT)} <br>
<b>Purchase Offer Price (Incl VAT):</b> ${fmt(purchaseOffer)} <br>
<b>คอมมิชชั่น:</b> ${fmt(commission)}
`

}

function num(id){ return parseFloat(document.getElementById(id).value)||0 }
function val(id){ return document.getElementById(id).value }
function fmt(x){ return Number(x).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) }

calculate()

</script>
</body>
</html>
