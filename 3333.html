<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>OWS PRO | Thai ORIX Leasing</title>

<style>
:root{
  --bg:#0f172a;
  --panel:#111827;
  --muted:#94a3b8;
  --txt:#e5e7eb;
  --accent:#22c55e;
  --accent-2:#0ea5e9;
  --border:#1f2937;
  --danger:#ef4444;
  --warn:#f59e0b;

  /* 🔹 Spacing System (8px scale) */
  --space-1:4px;
  --space-2:8px;
  --space-3:12px;
  --space-4:16px;
  --space-5:20px;
  --space-6:24px;
  --space-7:32px;
}

/* Base */
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--txt);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
}

.wrap{
  max-width:1100px;
  margin:var(--space-7) auto 120px;
  padding:0 var(--space-4);
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:var(--space-4);
}

/* Card */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:var(--space-5);
  margin-bottom:var(--space-5);
  box-shadow:0 4px 14px rgba(0,0,0,0.25);
  transition:all .2s ease;
}

.card:hover{
  border-color:#2a3445;
  box-shadow:0 6px 20px rgba(0,0,0,0.35);
}

/* Columns */
.col-12{grid-column:span 12}
.col-10{grid-column:span 10}
.col-8{grid-column:span 8}
.col-6{grid-column:span 6}
.col-5{grid-column:span 5}
.col-4{grid-column:span 4}
.col-3{grid-column:span 3}

/* Typography */
h2,h3{
  margin:0 0 var(--space-3);
  font-weight:600;
  letter-spacing:.3px;
}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:var(--space-2);
}

/* Inputs */
input,select{
  width:100%;
  background:#0b1220;
  color:var(--txt);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  transition:.15s ease;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--accent-2);
  box-shadow:0 0 0 2px rgba(14,165,233,.2);
}

input[readonly]{color:#a1a1aa}

/* Layout Helpers */
.row{
  display:flex;
  gap:var(--space-3);
  align-items:center;
}
.row>*{flex:1}

.muted{color:var(--muted)}
.hl{color:var(--accent);font-weight:600}

/* Buttons */
.btns{
  display:flex;
  gap:var(--space-3);
  flex-wrap:wrap;
  margin-top:var(--space-4);
}

button{
  background:#1e293b;
  color:var(--txt);
  border:1px solid var(--border);
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s ease;
}

button:hover{
  transform:translateY(-1px);
  border-color:#2a3445;
}

button.primary{
  background:var(--accent);
  color:#00310f;
  border-color:transparent;
  font-weight:700;
}

button.info{
  background:var(--accent-2);
  color:#032230;
  border-color:transparent;
  font-weight:700;
}

button.danger{
  background:var(--danger);
  color:#fff;
  border-color:transparent;
}

button.warn{
  background:var(--warn);
  color:#111827;
  border-color:transparent;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:var(--space-3);
}

th,td{
  border-bottom:1px dashed var(--border);
  padding:var(--space-2) var(--space-1);
  text-align:left;
  font-size:14px;
}

th{
  color:var(--muted);
  font-weight:600;
}

.right{text-align:right}
.center{text-align:center}
.hidden{display:none!important}

/* Quotation block */
.quote{
  background:#0a0f1a;
  border:1px solid var(--border);
  border-radius:14px;
  padding:var(--space-5);
  margin-top:var(--space-6);
}

.quote h2{
  margin:0 0 var(--space-2);
  font-size:18px;
}

.quote small{
  color:var(--muted);
}

/* Print */
@media print{
  body{background:#fff;color:#111}
  .no-print{display:none!important}
  .wrap{margin:0;max-width:100%}
  .quote{border:none}
  th,td{border-bottom:1px solid #ddd}
}
</style>
</head>

<body>

<header class="topbar">
  Thai ORIX Leasing – OWS PRO (Internal Tool)
</header>

<div class="app">

<!-- LEFT PANEL -->
<section class="panel">

<h3>Asset & Pricing</h3>
<label>ราคารถ (รวม VAT)</label>
<input id="gross" type="number" min="0" value="3159000"/>

<label>เงินดาวน์ (บาท)</label>
<input id="downInput" type="number" min="0" value="1288035"/>

<label>Flat Rate (% ต่อปี)</label>
<input id="flatRate" type="number" min="0" step="0.0001" value="3.09"/>

<label>จำนวนปี</label>
<input id="years" type="number" min="1" max="10" value="5"/>

<br><br>
<button class="primary" onclick="recalc()">คำนวณ</button>

<h3 style="margin-top:40px">Working Sheet</h3>
<table>
<tr><td>Finance</td><td id="finance"></td></tr>
<tr><td>Total Interest</td><td id="totalInterest"></td></tr>
<tr><td>Monthly (Inc VAT)</td><td id="pmtInc"></td></tr>
<tr><td>IRR (Year)</td><td id="irr"></td></tr>
</table>

</section>

<!-- RIGHT SUMMARY -->
<aside class="panel summary">

<div class="label">Monthly Payment</div>
<div id="pmtRounded" class="big-number">-</div>

<div class="grid-2">
<div>
<div class="label">Finance</div>
<div id="finance2"></div>
</div>
<div>
<div class="label">Term (Months)</div>
<div id="months"></div>
</div>
<div>
<div class="label">Down</div>
<div id="downShow"></div>
</div>
<div>
<div class="label">IRR</div>
<div id="irr2"></div>
</div>
</div>

</aside>

</div>

<script>
const fmt = v => Number(v).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
const clamp=(v,l,h)=>Math.max(l,Math.min(h,v));

function rate(nper,pmt,pv){
  let r=0.01;
  for(let i=0;i<50;i++){
    const f=pv*Math.pow(1+r,nper)+pmt*((Math.pow(1+r,nper)-1)/r);
    const df=nper*pv*Math.pow(1+r,nper-1)+pmt*((Math.pow(1+r,nper)-1)/r**2);
    r=r-f/df;
  }
  return r;
}

function recalc(){

  const vat=0.07;
  const gross=clamp(+gross.value,0,1e9);
  const down=clamp(+downInput.value,0,gross);
  const flat=clamp(+flatRate.value/100,0,1);
  const years=clamp(+years.value,1,10);
  const months=years*12;

  const finance=gross-down;
  const totalInterest=finance*flat*years;
  const monthly=(finance+totalInterest)/months;
  const monthlyRounded=Math.round(monthly);

  const r=rate(months,monthly/(1+vat),-finance/(1+vat))*12;

  finance2.textContent=fmt(finance);
  finance.textContent=fmt(finance);
  totalInterest.textContent=fmt(totalInterest);
  pmtInc.textContent=fmt(monthly);
  pmtRounded.textContent=fmt(monthlyRounded);
  months.textContent=months;
  downShow.textContent=fmt(down);
  irr.textContent=(r*100).toFixed(3)+" %";
  irr2.textContent=(r*100).toFixed(3)+" %";
}

recalc();
</script>

</body>
</html>
